<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Booking Form</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      padding: 20px;
    }

    .booking-form{
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .booking-form h1{
      text-align: center;
      margin-bottom: 25px;
      color: #0077b6;
    }

    .section{
      margin-bottom: 25px;
    }

    .section h2{
      margin-bottom: 15px;
      color: #023e8a;
      font-size: 20px;
    }

    label{
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    input,
    select,
    textarea{
      width: 100%;
      padding: 12px;
      border: 2px solid #dbeafe;
      border-radius: 12px;
      margin-bottom: 15px;
      outline: none;
      transition: 0.3s;
      font-size: 15px;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color: #00b4d8;
      box-shadow: 0 0 10px rgba(0,180,216,0.3);
    }

    textarea{
      resize: vertical;
      min-height: 100px;
    }

    .radio-group,
    .checkbox-group{
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .radio-group label,
    .checkbox-group label{
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: normal;
    }

    .radio-group input,
    .checkbox-group input{
      width: auto;
      margin: 0;
    }

    .buttons{
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }

    button{
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .book-btn{
      background: #0096c7;
      color: white;
    }

    .book-btn:hover{
      background: #0077b6;
      transform: scale(1.05);
    }

    .reset-btn{
      background: #caf0f8;
      color: #023e8a;
    }

    .reset-btn:hover{
      background: #90e0ef;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <form class="booking-form">
    <h1>✈️ Travel Booking Form</h1>

    
    <div class="section">
      <h2>1. Personal Information</h2>

      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Phone Number</label>
      <input type="tel" placeholder="+380..." required>
    </div>

    
    <div class="section">
      <h2>2. Travel Destination</h2>

      <label>Select Destination</label>
      <select required>
        <option value="">Choose city</option>
        <option>Paris</option>
        <option>Rome</option>
        <option>Tokyo</option>
        <option>New York</option>
        <option>Barcelona</option>
      </select>
    </div>

    
    <div class="section">
      <h2>3. Travel Dates</h2>

      <label>Departure Date</label>
      <input type="date">

      <label>Return Date</label>
      <input type="date">
    </div>

    
    <div class="section">
      <h2>4. Accommodation Type</h2>

      <div class="radio-group">
        <label>
          <input type="radio" name="stay">
          Hotel
        </label>

        <label>
          <input type="radio" name="stay">
          Apartment
        </label>

        <label>
          <input type="radio" name="stay">
          Hostel
        </label>
      </div>
    </div>

    
    <div class="section">
      <h2>5. Additional Services</h2>

      <div class="checkbox-group">
        <label>
          <input type="checkbox">
          Breakfast
        </label>

        <label>
          <input type="checkbox">
          Airport transfer
        </label>

        <label>
          <input type="checkbox">
          Excursion guide
        </label>

        <label>
          <input type="checkbox">
          Travel insurance
        </label>
      </div>
    </div>

    
    <div class="section">
      <h2>6. Special Requests</h2>

      <textarea placeholder="Write your comments here..."></textarea>
    </div>

    
    <div class="section">
      <h2>7. Payment Method</h2>

      <div class="radio-group">
        <label>
          <input type="radio" name="payment">
          Card
        </label>

        <label>
          <input type="radio" name="payment">
          Cash
        </label>

        <label>
          <input type="radio" name="payment">
          PayPal
        </label>
      </div>
    </div>

    
    <div class="buttons">
      <button type="submit" class="book-btn">
        Book Now
      </button>

      <button type="reset" class="reset-btn">
        Reset
      </button>
    </div>

  </form>

</body>
</html>
