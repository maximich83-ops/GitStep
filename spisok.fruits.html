<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список фруктів</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Весь список */
        ul {
            background-color: #f2f2f2; /* світлий фон */
            padding: 20px;
            margin: 20px;
            width: 250px;
            list-style: none;
        }

        /* Кожен елемент */
        li {
            background-color: #d9d9d9; /* темніший фон */
            margin: 10px 0;
            padding: 10px;
        }

        /* Текст */
        li span {
            background-color: #a6a6a6; /* найтемніший фон */
            padding: 5px 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<h2>Список фруктів</h2>

<ul>
    <li><span>Яблуко</span></li>
    <li><span>Банан</span></li>
    <li><span>Апельсин</span></li>
    <li><span>Груша</span></li>
</ul>

</body>
</html>
